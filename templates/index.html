<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도서 제작 및 책등(세네카) 계산기</title>
    <style>
        /* 기본 배경 및 UI 폰트 세팅 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* 메인 컨테이너 구조 */
        .calculator-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 1000px;
            padding: 30px;
            display: flex;
            gap: 25px;
        }

        /* 왼쪽 입력 및 계산 폼 영역 */
        .left-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 오른쪽 검은색 종이 빠른 선택 패널 영역 */
        .right-panel {
            flex: 1.8;
            background-color: #1a1a1a;
            color: #fff;
            border-radius: 10px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        h2, h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .left-panel h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; }
        .right-panel h3 { color: #f1c40f; border-bottom: 1px solid #444; padding-bottom: 8px; }

        /* 입력 필드 스타일 그룹 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #4f5d75;
        }

        .input-group input, .input-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #3498db;
        }

        /* 기존 세네카 결과 표기창 */
        .result-box {
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .result-box .spine-value {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* ⭐ 기존 즐겨찾기 UI 스타일 (완벽 복원) */
        .bookmark-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
        }
        .bookmark-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .bookmark-btn:hover { background-color: #2980b9; }
        .bookmark-list {
            margin-top: 10px;
            list-style: none;
            padding: 0;
            max-height: 120px;
            overflow-y: auto;
        }
        .bookmark-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 6px 10px;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 13px;
            cursor: pointer;
        }
        .bookmark-item:hover { background: #e9ecef; }
        .delete-bookmark {
            color: #e74c3c;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* 우측 패널 지종 선택 토글 버튼 배치 */
        .paper-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .paper-btn {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s;
        }

        .paper-btn:hover {
            background-color: #444;
            border-color: #f1c40f;
        }

        .paper-btn.active {
            background-color: #f1c40f;
            color: #1a1a1a;
            border-color: #f1c40f;
            font-weight: bold;
        }

        /* 축소 및 슬림화 완료된 우측 마스터 테이블 스타일 */
        .paper-table-container {
            flex: 1;
            overflow-y: auto;
            background-color: #222;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .paper-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: center;
        }

        .paper-table th {
            background-color: #2d2d2d;
            color: #f1c40f;
            padding: 10px;
            font-weight: 600;
            border-bottom: 2px solid #444;
            position: sticky;
            top: 0;
        }

        .paper-table td {
            padding: 10px;
            border-bottom: 1px solid #333;
            color: #ddd;
        }

        .paper-table tr {
            cursor: pointer;
            transition: background 0.15s;
        }

        .paper-table tr:hover {
            background-color: #2a2a2a;
        }

        .paper-table tr.selected {
            background-color: #34495e !important;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    
    <div class="left-panel">
        <h2>책등(세네카) 계산기</h2>
        
        <div class="input-group">
            <label for="pageCount">본문 총 페이지 수 (p)</label>
            <input type="number" id="pageCount" value="200" min="1" oninput="calculateSpine()">
        </div>
        
        <div class="input-group">
            <label for="paperThickness">선택된 종이 두께 (μm)</label>
            <input type="number" id="paperThickness" value="100" step="0.1" oninput="calculateSpine()">
        </div>

        <div class="input-group">
            <label for="coverThickness">표지 두께 보정값 (mm)</label>
            <input type="number" id="coverThickness" value="0.5" step="0.1" oninput="calculateSpine()">
        </div>

        <div class="result-box">
            <div>예상 책등(세네카) 두께</div>
            <div class="spine-value" id="spineResult">0.00 mm</div>
        </div>

        <div class="bookmark-section">
            <button class="bookmark-btn" onclick="addBookmark()">★ 현재 설정 즐겨찾기 추가</button>
            <ul id="bookmarkList" class="bookmark-list"></ul>
        </div>
    </div>

    <div class="right-panel">
        <h3>5대 지종 및 특수 규격 빠른 선택</h3>
        
        <div class="paper-buttons">
            <button class="paper-btn active" onclick="switchPaperGroup('art_snow', this)">아트지/스노우지</button>
            <button class="paper-btn" onclick="switchPaperGroup('white_mojo', this)">모조지(백색)</button>
            <button class="paper-btn" onclick="switchPaperGroup('cream_mojo', this)">모조지(미색)</button>
            <button class="paper-btn" onclick="switchPaperGroup('arte', this)">아르떼 UW/NW</button>
            <button class="paper-btn" onclick="switchPaperGroup('dohwa', this)">도화지</button>
            <button class="paper-btn" onclick="switchPaperGroup('rendezvous_natural', this)">랑데뷰 내추럴</button>
            <button class="paper-btn" onclick="switchPaperGroup('rendezvous_ultra', this)">랑데뷰 울트라화이트</button>
        </div>

        <div class="paper-table-container">
            <table class="paper-table">
                <thead>
                    <tr>
                        <th style="width: 35%;">지종</th>
                        <th style="width: 15%;">평량</th>
                        <th id="header-spec3" style="width: 25%;">4*6판</th>
                        <th id="header-spec4" style="width: 25%;">국전</th>
                    </tr>
                </thead>
                <tbody id="paper-list-body">
                    </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    // 질문자님이 제공해주신 순도 100% 실무 고시가 및 두께 연동용 마스터 데이터셋

            { name: "아트지/스노우지", weight: "120g", val1: "105,590원", val2: "73,350원",  thickness: 110 },
            { name: "아트지/스노우지", weight: "150g", val1: "134,290원", val2: "111,940원", thickness: 140 },
            { name: "아트지/스노우지", weight: "180g", val1: "161,150원", val2: "124,380원", thickness: 175 },
            { name: "아트지/스노우지", weight: "200g", val1: "179,050원", val2: "124,380원", thickness: 195 },
            { name: "아트지/스노우지", weight: "250g", val1: "223,810원", val2: "155,470원", thickness: 245 },
            { name: "아트지/스노우지", weight: "300g", val1: "268,580원", val2: "186,570원", thickness: 310 }
        ],
        white_mojo: [
            { name: "백색모조", weight: "70g",  val1: "65,010원",  val2: "45,160원",  thickness: 88 },
            { name: "백색모조", weight: "80g",  val1: "71,400원",  val2: "49,600원",  thickness: 100 },
            { name: "백색모조", weight: "100g", val1: "88,470원",  val2: "61,460원",  thickness: 120 },
            { name: "백색모조", weight: "120g", val1: "106,160원", val2: "73,750원",  thickness: 145 },
            { name: "백색모조", weight: "150g", val1: "132,700원", val2: "92,180원",  thickness: 180 },
            { name: "백색모조", weight: "180g", val1: "159,240원", val2: "110,620원", thickness: 215 },
            { name: "백색모조", weight: "220g", val1: "203,370원", val2: "141,270원", thickness: 260 },
            { name: "백색모조", weight: "260g", val1: "240,340원", val2: "166,960원", thickness: 310 }
        ],
        cream_mojo: [
            { name: "미색모조", weight: "70g",  val1: "66,960원",  val2: "46,820원", thickness: 90 },
            { name: "미색모조", weight: "80g",  val1: "73,540원",  val2: "51,090원", thickness: 102 },
            { name: "미색모조", weight: "100g", val1: "91,130원",  val2: "63,300원", thickness: 124 },
            { name: "미색모조", weight: "120g", val1: "109,350원", val2: "75,960원", thickness: 148 }
        ],
        arte: [
            { name: "아르떼 UW/NW", weight: "105g", val1: "165,870원", val2: "115,230원", thickness: 130 },
            { name: "아르떼 UW/NW", weight: "130g", val1: "205,360원", val2: "142,650원", thickness: 160 },
            { name: "아르떼 UW/NW", weight: "160g", val1: "254,760원", val2: "175,580원", thickness: 200 },
            { name: "아르떼 UW/NW", weight: "190g", val1: "300,140원", val2: "208,500원", thickness: 240 },
            { name: "아르떼 UW/NW", weight: "210g", val1: "331,740원", val2: "230,440원", thickness: 265 },
            { name: "아르떼 UW/NW", weight: "230g", val1: "363,330원", val2: "252,390원", thickness: 290 },
            { name: "아르떼 UW/NW", weight: "310g", val1: "489,710원", val2: "340,180원", thickness: 395 }
        ],
        dohwa: [
            { name: "도화지", weight: "105g",      val1: "91,370원",  val2: "0원", thickness: 140 },
            { name: "도화지", weight: "130g",      val1: "113,130원", val2: "0원", thickness: 175 },
            { name: "도화지", weight: "170g",      val1: "147,940원", val2: "0원", thickness: 225 },
            { name: "도화지", weight: "180g",      val1: "156,640원", val2: "0원", thickness: 240 },
            { name: "도화지", weight: "200g(미색)", val1: "248,850원", val2: "0원", thickness: 270 },
            { name: "도화지", weight: "220g",      val1: "273,740원", val2: "0원", thickness: 300 }
        ],
        rendezvous_natural: [
            { name: "랑데뷰 내추럴", weight: "105g", val1: "197,010원", val2: "136,860원", thickness: 130 },
            { name: "랑데뷰 내추럴", weight: "130g", val1: "243,920원", val2: "169,440원", thickness: 160 },
            { name: "랑데뷰 내추럴", weight: "160g", val1: "300,210원", val2: "208,540원", thickness: 200 },
            { name: "랑데뷰 내추럴", weight: "190g", val1: "356,500원", val2: "247,650원", thickness: 240 },
            { name: "랑데뷰 내추럴", weight: "210g", val1: "394,030원", val2: "273,710원", thickness: 265 },
            { name: "랑데뷰 내추럴", weight: "240g", val1: "450,320원", val2: "312,820원", thickness: 315 }
        ],
        rendezvous_ultra: [
            { name: "랑데뷰 울트라화이트", weight: "105g", val1: "197,010원", val2: "136,860원", thickness: 130 },
            { name: "랑데뷰 울트라화이트", weight: "130g", val1: "243,920원", val2: "169,440원", thickness: 160 },
            { name: "랑데뷰 울트라화이트", weight: "160g", val1: "300,210원", val2: "208,540원", thickness: 200 },
            { name: "랑데뷰 울트라화이트", weight: "190g", val1: "356,500원", val2: "247,650원", thickness: 240 },
            { name: "랑데뷰 울트라화이트", weight: "210g", val1: "394,030원", val2: "273,710원", thickness: 265 },
            { name: "랑데뷰 울트라화이트", weight: "240g", val1: "450,320원", val2: "312,820원", thickness: 315 },
            { name: "랑데뷰 울트라화이트", weight: "310g", val1: "- 원",      val2: "404,050원", thickness: 410 }
        ]
    };

    // 지종 토글 버튼 변경 및 테이블 헤더 실무 스위칭 함수
    function switchPaperGroup(groupKey, buttonElement) {
        const buttons = document.querySelectorAll('.paper-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        buttonElement.classList.add('active');

        const spec3Header = document.getElementById('header-spec3');
        if (groupKey === 'dohwa') {
            spec3Header.innerText = '1060*757';
        } else {
            spec3Header.innerText = '4*6판';
        }

        const tbody = document.getElementById('paper-list-body');
        tbody.innerHTML = '';

        const dataList = paperMasterData[groupKey];
        dataList.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.name}</td>
                <td><strong style="color:#fff;">${item.weight}</strong></td>
                <td>${item.val1}</td>
                <td>${item.val2}</td>
            `;
            
            tr.onclick = function() {
                const rows = tbody.querySelectorAll('tr');
                rows.forEach(r => r.classList.remove('selected'));
                tr.classList.add('selected');

                document.getElementById('paperThickness').value = item.thickness;
                calculateSpine();
            };
            
            tbody.appendChild(tr);
        });
    }

    // 핵심 세네카 연동 계산 수식 로직
    function calculateSpine() {
        const pageCount = parseFloat(document.getElementById('pageCount').value) || 0;
        const thicknessMicron = parseFloat(document.getElementById('paperThickness').value) || 0;
        const coverThickness = parseFloat(document.getElementById('coverThickness').value) || 0;

        const spineThickness = (pageCount / 2) * (thicknessMicron / 1000) + coverThickness;

        if (spineThickness > 0 && pageCount > 0) {
            document.getElementById('spineResult').innerText = spineThickness.toFixed(2) + " mm";
        } else {
            document.getElementById('spineResult').innerText = "0.00 mm";
        }
    }

    // ⭐ 기존 즐겨찾기 스크립트 로직 (완벽 보존)
    function loadBookmarks() {
        const bookmarks = JSON.parse(localStorage.getItem('spineBookmarks')) || [];
        const listEl = document.getElementById('bookmarkList');
        listEl.innerHTML = '';
        
        bookmarks.forEach((b, index) => {
            const li = document.createElement('li');
            li.className = 'bookmark-item';
            li.innerHTML = `
                <span onclick="applyBookmark(${b.page}, ${b.thick}, ${b.cover})">
                    📄 ${b.page}p / 📐 ${b.thick}μm / 📔 ${b.cover}mm → <strong>${b.result}</strong>
                </span>
                <button class="delete-bookmark" onclick="deleteBookmark(${index}); event.stopPropagation();">×</button>
            `;
            listEl.appendChild(li);
        });
    }

    function addBookmark() {
        const page = document.getElementById('pageCount').value;
        const thick = document.getElementById('paperThickness').value;
        const cover = document.getElementById('coverThickness').value;
        const result = document.getElementById('spineResult').innerText;

        const bookmarks = JSON.parse(localStorage.getItem('spineBookmarks')) || [];
        bookmarks.push({ page, thick, cover, result });
        localStorage.setItem('spineBookmarks', JSON.stringify(bookmarks));
        loadBookmarks();
    }

    function deleteBookmark(index) {
        const bookmarks = JSON.parse(localStorage.getItem('spineBookmarks')) || [];
        bookmarks.splice(index, 1);
        localStorage.setItem('spineBookmarks', JSON.stringify(bookmarks));
        loadBookmarks();
    }

    function applyBookmark(page, thick, cover) {
        document.getElementById('pageCount').value = page;
        document.getElementById('paperThickness').value = thick;
        document.getElementById('coverThickness').value = cover;
        calculateSpine();
    }

    // 앱 구동 시 초기 기본 실행값 및 즐겨찾기 로드
    window.onload = function() {
        const defaultBtn = document.querySelector('.paper-btn');
        switchPaperGroup('art_snow', defaultBtn);
        calculateSpine();
        loadBookmarks(); // 즐겨찾기 목록 연동 실행
    };
</script>

</body>
</html>
